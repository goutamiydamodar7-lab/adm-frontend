<!DOCTYPE html>
<html>
<head>
  <title>Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-700 to-pink-600 text-white flex">

<!-- SIDEBAR -->
<div class="w-64 p-6 bg-white/10 backdrop-blur-xl">
  <h2 class="text-2xl font-bold mb-6">🎓 Admin</h2>

  <a href="dashboard.html" class="block p-2 hover:bg-white/20 rounded">Dashboard</a>
  <a href="users.html" class="block p-2 hover:bg-white/20 rounded">Users</a>
  <a href="reports.html" class="block p-2 bg-white/20 rounded">Reports</a>
  <a href="settings.html" class="block p-2 hover:bg-white/20 rounded">Settings</a>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

  <h1 class="text-2xl font-bold mb-6">Reports</h1>

  <div class="grid grid-cols-3 gap-5">

    <div class="bg-white/10 p-5 rounded-xl">
      <p>Total Admissions</p>
      <h2 id="total" class="text-3xl font-bold">0</h2>
    </div>

    <div class="bg-green-500/30 p-5 rounded-xl">
      <p>Approved</p>
      <h2 id="approved">0</h2>
    </div>

    <div class="bg-yellow-400/30 p-5 rounded-xl">
      <p>Pending</p>
      <h2 id="pending">0</h2>
    </div>

  </div>

</div>

<script>
async function loadReports(){
  const res = await fetch("http://localhost:5000/api/admissions");
  const data = await res.json();

  let approved=0, pending=0;

  data.forEach(a=>{
    if(a.status==="Approved") approved++;
    else pending++;
  });

  total.innerText = data.length;
  approved.innerText = approved;
  pending.innerText = pending;
}

loadReports();
</script>

</body>
</html>
