<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Courses</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold mb-6 text-center">Available Courses</h1>

  <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow-md">
    <ul id="coursesList" class="space-y-2">
      <!-- Courses will be loaded here -->
    </ul>
  </div>

  <script>
    // List of 4 courses
    const courses = ["Artificial Intelligence", "Electronics", "Electrical", "Computer Science"];

    const list = document.getElementById("coursesList");
    courses.forEach(course => {
      const li = document.createElement("li");
      li.textContent = course;
      li.className = "border p-3 rounded bg-gray-50 hover:bg-gray-100";
      list.appendChild(li);
    });
  </script>

</body>
</html>
