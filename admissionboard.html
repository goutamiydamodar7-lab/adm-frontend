<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="output.css">
</head>

<body class="bg-gray-100 min-h-screen p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Admin Dashboard</h1>
    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
  </div>

  <!-- Stats -->
  <div class="mb-6">
    <div class="bg-white p-4 rounded shadow w-60">
      <h2 class="text-lg font-semibold">Total Users</h2>
      <p id="userCount" class="text-2xl font-bold text-blue-500">0</p>
    </div>
  </div>

  <!-- Search -->
  <div class="mb-6">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search users..." 
      class="w-full p-2 border rounded"
    >
  </div>

  <!-- Users List -->
  <div id="usersContainer" class="grid md:grid-cols-3 gap-4"></div>

  <script>
    const usersContainer = document.getElementById('usersContainer');
    const userCount = document.getElementById('userCount');
    const searchInput = document.getElementById('searchInput');
    const logoutBtn = document.getElementById('logoutBtn');

    let users = [];

    // ✅ Check login
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = "login.html";
    }

    // ✅ Fetch users
    async function fetchUsers() {
      try {
        const res = await fetch('http://localhost:5000/api/users', {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        users = await res.json();
        userCount.textContent = users.length;

        displayUsers(users);

      } catch (err) {
        console.error(err);
      }
    }

    // ✅ Display users
    function displayUsers(data) {
      usersContainer.innerHTML = '';

      data.forEach(user => {
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded shadow";

        card.innerHTML = `
          <h2 class="text-xl font-semibold">${user.name}</h2>
          <p class="text-gray-600">${user.email}</p>

          <button onclick="deleteUser('${user._id}')" 
            class="mt-2 bg-red-500 text-white px-3 py-1 rounded">
            Delete
          </button>
        `;

        usersContainer.appendChild(card);
      });
    }

    // ✅ Search functionality
    searchInput.addEventListener('input', () => {
      const value = searchInput.value.toLowerCase();

      const filtered = users.filter(u => 
        u.name.toLowerCase().includes(value) ||
        u.email.toLowerCase().includes(value)
      );

      displayUsers(filtered);
    });

    // ✅ Delete user
    async function deleteUser(id) {
      if (!confirm("Are you sure to delete?")) return;

      try {
        await fetch(`http://localhost:5000/api/users/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        fetchUsers(); // refresh list

      } catch (err) {
        console.error(err);
      }
    }

    // ✅ Logout
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = "login.html";
    });

    fetchUsers();
  </script>

</body>
</html>
