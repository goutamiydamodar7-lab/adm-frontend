<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold mb-6 text-center">Submit Admission</h1>

  <div class="max-w-md mx-auto bg-white p-6 rounded shadow-md">
    <form id="admissionForm" class="space-y-4">
      <input type="text" name="name" placeholder="Name" class="w-full border p-2 rounded" required>
      <input type="email" name="email" placeholder="Email" class="w-full border p-2 rounded" required>

      <select name="course" class="w-full border p-2 rounded" required>
        <option value="" disabled selected>Select Course</option>
        <option value="Electronics">Electronics</option>
        <option value="Electrical">Electrical</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Artificial Intelligence">Artificial Intelligence</option>
      </select>

      <input type="text" name="phone" placeholder="Phone" class="w-full border p-2 rounded" required>


      <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">
        Submit
      </button>
    </form>
  </div>

  <script>
    const token = localStorage.getItem("token"); // optional: attach token if logged in

    document.getElementById("admissionForm").addEventListener("submit", async e => {
      e.preventDefault();
      const data = {
        name: e.target.name.value,
        email: e.target.email.value,
        course: e.target.course.value,
        phone: e.target.phone.value
        
      };

      const headers = { "Content-Type": "application/json" };
      if (token) headers["Authorization"] = `Bearer ${token}`;

      try {
        const res = await fetch("http://localhost:5000/api/admissions", {
          method: "POST",
          headers,
          body: JSON.stringify(data)
        });

        const result = await res.json();
        alert(result.message || result.error);
        e.target.reset(); // reset form after submission
      } catch (err) {
        console.error(err);
        alert("Error submitting admission.");
      }
    });
  </script>

</body>
</html>
