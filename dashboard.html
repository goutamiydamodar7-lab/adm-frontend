<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex">

<!-- ✅ LOGIN PROTECTION -->
<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Login required!");
  window.location.href = "login.html";
}
</script>

<!-- ✅ SIDEBAR -->
<div id="sidebar"></div>

<!-- ✅ MAIN CONTENT -->


<!-- ✅ SIDEBAR SCRIPT -->
<script>
const sidebar = document.getElementById("sidebar");

// admin sidebar
sidebar.innerHTML = `
  <div class="w-64 bg-gray-900 text-white min-h-screen p-5">
    <h2 class="text-2xl font-bold mb-8 text-center">Admin Panel</h2>

    <ul class="space-y-4">
      <li><a href="dashboard.html" class="block bg-gray-700 p-2 rounded">Dashboard</a></li>
      <li><a href="admission.html" class="block hover:bg-gray-700 p-2 rounded">Add Admission</a></li>
      <li><a href="viewadmission.html" class="block hover:bg-gray-700 p-2 rounded">View Admissions</a></li>
      <li><a href="courses.html" class="block hover:bg-gray-700 p-2 rounded">Courses</a></li>
      <li>
        <button onclick="logout()" class="w-full text-left hover:bg-red-600 p-2 rounded">
          Logout
        </button>
      </li>
    </ul>
  </div>
  
`;

// logout
function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}
</script>

</body>
</html>
